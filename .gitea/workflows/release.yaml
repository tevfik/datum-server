name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      
      - name: Build Cross-Platform Binaries
        run: |
          make build-release VERSION=${{ github.ref_name }}

      - name: Upload Backend Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: backend-binaries
          path: build/release/*

  build-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true
      
      - name: Build APK (Inject Version)
        working-directory: examples/datum_camera_app
        run: |
          # Strip 'v' prefix from tag (v1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF_NAME#v}
          echo "Building version: $VERSION"
          
          flutter pub get
          flutter build apk --release --build-name=$VERSION --build-number=${{ github.run_number }}
          mkdir -p ../../build/release
          mv build/app/outputs/flutter-apk/app-release.apk ../../build/release/datum_camera_app.apk
      
      - name: Upload Mobile Artifact
        uses: actions/upload-artifact@v3
        with:
          name: mobile-apk
          path: build/release/datum_camera_app.apk

  build-firmware:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v3

      - name: Install Arduino CLI
        run: |
          mkdir -p bin
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=./bin sh
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Install ESP32 Core
        run: |
          arduino-cli config init
          arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          
          # Retry loop for flaky downloads
          n=0
          until [ "$n" -ge 5 ]
          do
             echo "Attempting to install ESP32 core ($((n+1))/5)..."
             arduino-cli core install esp32:esp32@3.0.7 --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json && break
             n=$((n+1)) 
             echo "Install failed. Retrying in 10s..."
             sleep 10
          done
          
          # Fail if still not installed
          if [ "$n" -ge 5 ]; then
            echo "Failed to install ESP32 core after 5 attempts."
            exit 1
          fi

      - name: Compile Firmware
        run: |
          mkdir -p build/release
          # Freenove S3 uses OPI PSRAM and 8MB Flash usually. Target: esp32s3
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3:PSRAM=opi,FlashMode=qio,FlashSize=8M \
            --output-dir build/release \
            --build-property "build.extra_flags=-DARDUINO_USB_CDC_ON_BOOT=1" \
            examples/esp32-s3-camera/esp32_camera_streamer/esp32_camera_streamer.ino
          
          mv build/release/esp32_camera_streamer.ino.bin build/release/firmware-esp32s3.bin
          
      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v3
        with:
          name: firmware
          path: build/release/firmware-esp32s3.bin

  create-release:
    needs: [build-backend, build-mobile, build-firmware]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v3
      
      - name: Prepare Assets
        run: |
          mkdir -p assets
          cp backend-binaries/* assets/
          cp mobile-apk/* assets/
          cp firmware/* assets/
          ls -R assets/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: assets/*
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Upload to Package Registry
        run: |
          echo "Uploading assets to Gitea Generic Package Registry..."
          for file in assets/*; do
            filename=$(basename "$file")
            echo "Processing $filename..."
            # API URL: <server>/api/packages/<owner>/generic/<package_name>/<version>/<filename>
            # We use 'datum-release' as the package name to group all artifacts.
            curl -v --fail -X PUT \
              --user "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              "${{ github.server_url }}/api/packages/${{ github.repository_owner }}/generic/datum-release/${{ github.ref_name }}/$filename" \
              --upload-file "$file"
          done
