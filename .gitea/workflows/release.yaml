name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: '1.24'
      
      - name: Build Cross-Platform Binaries
        run: |
          if [[ $GITHUB_REF_TYPE == "tag" ]]; then
            VER=${{ github.ref_name }}
          else
            VER="0.0.0-dev.${{ github.run_number }}"
          fi
          make build-release VERSION=$VER

      - name: Upload Backend Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: backend-binaries
          path: build/release/*

  build-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true
      
      - name: Build APK (Inject Version)
        working-directory: examples/datum_camera_app
        run: |
          # Determine version
          if [[ $GITHUB_REF_TYPE == "tag" ]]; then
            VERSION=${GITHUB_REF_NAME#v}
          else
            VERSION="0.0.0-dev.${{ github.run_number }}"
          fi
          echo "Building version: $VERSION"
          
          flutter pub get
          flutter build apk --release --build-name=$VERSION --build-number=${{ github.run_number }}
          mkdir -p ../../build/release
          mv build/app/outputs/flutter-apk/app-release.apk ../../build/release/datum_camera_app.apk
      
      - name: Upload Mobile Artifact
        uses: actions/upload-artifact@v3
        with:
          name: mobile-apk
          path: build/release/datum_camera_app.apk



  create-release:
    needs: [build-backend, build-mobile]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/download-artifact@v3
      
      - name: Prepare Assets
        run: |
          mkdir -p assets
          cp backend-binaries/* assets/
          cp mobile-apk/* assets/

          ls -R assets/

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: assets/*
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Upload to Package Registry
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "Uploading assets to Gitea Generic Package Registry..."
          for file in assets/*; do
            filename=$(basename "$file")
            echo "Processing $filename..."
            # API URL: <server>/api/packages/<owner>/generic/<package_name>/<version>/<filename>
            # We use 'datum-release' as the package name to group all artifacts.
            curl -v --fail -X PUT \
              --user "${{ github.actor }}:${{ secrets.PACKAGE_ARTIFACTORY_TOKEN || secrets.GITEA_TOKEN || secrets.GITHUB_TOKEN }}" \
              "${{ github.server_url }}/api/packages/${{ github.repository_owner }}/generic/datum-release/${{ github.ref_name }}/$filename" \
              --upload-file "$file"
          done
