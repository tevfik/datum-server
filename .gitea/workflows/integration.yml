name: Integration

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'tests/**'
      - 'cmd/**'
      - '.github/workflows/integration.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Generate go.sum
        run: go mod tidy && go mod verify

      - name: Build datum-server
        run: |
          CGO_ENABLED=0 go build -o datum-server ./cmd/server

      - name: Build datumctl
        run: |
          CGO_ENABLED=0 go build -o datumctl ./cmd/datumctl

      - name: Make binaries executable
        run: |
          chmod +x datum-server datumctl

      - name: Install Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv
          python3 -m venv venv
          . venv/bin/activate
          pip3 install requests

      - name: Run integration tests
        run: |
          chmod +x tests/*.sh
          . venv/bin/activate
          
          # Start server in background
          mkdir -p data
          ./datum-server > server.log 2>&1 &
          SERVER_PID=$!
          echo "Server started with PID $SERVER_PID"
          
          # Wait for server to be ready
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8000/health > /dev/null; then
              echo "Server is ready!"
              break
            fi
            sleep 1
          done
          
          if ! curl -s http://localhost:8000/health > /dev/null; then
            echo "Server failed to start"
            cat server.log
            exit 1
          fi
          
          # Run integration test suite from root
          ./tests/integration_test.sh
          python3 ./tests/provisioning_test.py
          ./tests/sse_test.sh
          
          # Cleanup
          kill $SERVER_PID || true

      - name: Cleanup
        if: always()
        run: |
          pkill -f datum-server || true
          rm -rf ./data
