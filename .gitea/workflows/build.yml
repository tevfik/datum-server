name: Build

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/**'
      - '.gitea/workflows/build.yml'
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - {os: linux, arch: amd64}
          - {os: linux, arch: arm64}
          - {os: darwin, arch: amd64}
          - {os: darwin, arch: arm64}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Generate go.sum
        run: go mod tidy && go mod verify

      - name: Build datum-server
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o build/datum-server-${{ matrix.target.os }}-${{ matrix.target.arch }} ./cmd/server

      - name: Build datumctl
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o build/datumctl-${{ matrix.target.os }}-${{ matrix.target.arch }} ./cmd/datumctl

      - name: Upload binaries
        uses: actions/upload-artifact@v3
        with:
          name: binaries-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: build/*

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Generate go.sum
        run: go mod download && go mod tidy

      - name: Build Docker image
        run: |
          cd docker
          docker build -f Dockerfile -t datum-server:test ..

      - name: Test Docker image
        run: |
          # Cleanup any existing container
          docker rm -f datum-server-test 2>/dev/null || true
          
          # Run container with auto-remove
          docker run -d --rm --name datum-server-test -p 8000:8000 datum-server:test
          sleep 5
          
          # Test health endpoint
          curl -f http://localhost:8000/health || exit 1
          
          # Verify datumctl is available
          docker exec datum-server-test datumctl --version || exit 1

      - name: Cleanup Docker container
        if: always()
        run: |
          docker stop datum-server-test 2>/dev/null || true
          docker rm datum-server-test 2>/dev/null || true
