name: Build

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/**'
      - '.gitea/workflows/build.yml'
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - {os: linux, arch: amd64}
          - {os: linux, arch: arm64}
          - {os: darwin, arch: amd64}
          - {os: darwin, arch: arm64}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Generate go.sum
        run: go mod tidy && go mod verify

      - name: Build datum-server
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o build/datum-server-${{ matrix.target.os }}-${{ matrix.target.arch }} ./cmd/server

      - name: Build datumctl
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o build/datumctl-${{ matrix.target.os }}-${{ matrix.target.arch }} ./cmd/datumctl

      - name: Upload binaries
        uses: actions/upload-artifact@v3
        with:
          name: binaries-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: build/*

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Generate go.sum
        run: go mod download && go mod tidy

      - name: Build Docker image
        run: |
          cd docker
          docker build -f Dockerfile -t datum-server:test ..

      - name: Test Docker image
        run: |
          # Cleanup any existing container
          docker rm -f datum-server-test 2>/dev/null || true
          
          # Run container (without --rm so we can get logs if it fails)
          # Use port 8081 on host to avoid conflicts with other services
          docker run -d --name datum-server-test -p 8081:8000 datum-server:test
          
          # Wait for container to be ready (with timeout)
          echo "Waiting for server to start..."
          sleep 5 # Give it a moment to initialize
          
          # Get container IP for direct access if localhost fails (common in DinD)
          CONTAINER_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' datum-server-test)
          echo "Container IP: $CONTAINER_IP"
          
          for i in {1..60}; do
            # Check if container is still running using inspect which is more reliable than ps | grep
            if [ "$(docker inspect -f '{{.State.Running}}' datum-server-test 2>/dev/null)" != "true" ]; then
              echo "❌ Container stopped unexpectedly"
              echo "Container status:"
              docker ps -a --filter name=datum-server-test
              echo "Container logs:"
              docker logs datum-server-test 2>&1 || echo "No logs available"
              exit 1
            fi
            
            # Try localhost first
            if curl -f http://localhost:8081/health 2>/dev/null; then
              echo "✅ Server is ready (localhost)!"
              break
            fi
            
            # Try container IP directly (fallback for DinD)
            if [ ! -z "$CONTAINER_IP" ] && curl -f http://$CONTAINER_IP:8000/health 2>/dev/null; then
              echo "✅ Server is ready (container IP)!"
              break
            fi
            
            if [ $i -eq 30 ]; then
              echo "❌ Timeout waiting for server"
              echo "Container logs:"
              docker logs datum-server-test 2>&1
              exit 1
            fi
            echo "Attempt $i/30: Server not ready yet, waiting..."
            sleep 2
          done
          
          # Verify datumctl is available
          docker exec datum-server-test datumctl version || exit 1
          
          echo "✅ Docker image test passed!"

      - name: Cleanup Docker container
        if: always()
        run: |
          docker stop datum-server-test 2>/dev/null || true
          docker rm datum-server-test 2>/dev/null || true
