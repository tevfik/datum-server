# Docker Compose Development Override
# Use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  api:
    build:
      context: ./backend/go
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend/go:/app
      - ./data:/app/data
    environment:
      - PORT=8000
      - RETENTION_MAX_DAYS=7
      - RETENTION_CHECK_HOURS=1
      - LOG_LEVEL=debug
      - GIN_MODE=debug
    command: |
      sh -c "go run ./cmd/server"

  analytics:
    build:
      context: ./backend/python
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend/python:/app
    environment:
      - GO_API_URL=http://api:8000
      - LOG_LEVEL=debug
    command: |
      uvicorn analytics.api:app --host 0.0.0.0 --port 8001 --reload
