# Docker Compose Development Override
# Use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # Disable Traefik in development (direct access)
  traefik:
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=DEBUG"
    ports:
      - "80:80"
      - "8080:8080"

  datum-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ..:/app
      - datum-data-dev:/root/data
    environment:
      - PORT=8000
      - JWT_SECRET=dev-secret-key-not-for-production-use-only
      - RETENTION_MAX_DAYS=1
      - RETENTION_CHECK_HOURS=1
      - LOG_LEVEL=DEBUG
      - LOG_FORMAT=pretty
      - CORS_ORIGINS=*
      - RATE_LIMIT_REQUESTS=10000
    # Direct port exposure for development
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.datum-server.rule=Host(`localhost`)"
      - "traefik.http.routers.datum-server.entrypoints=web"
      - "traefik.http.services.datum-server.loadbalancer.server.port=8000"
    command: |
      sh -c "cd /app && go run ./cmd/server"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datum_secret}
      POSTGRES_DB: ${POSTGRES_DB:-datum}
    ports:
      - "5432:5432" # Expose DB for local inspection
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datum}" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  datum-data-dev:
  postgres_data_dev:
