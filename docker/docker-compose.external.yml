services:
  datum-server:
    image: datum-server:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: datum-server
    restart: unless-stopped
    ports:
      # Ports are handled by External Traefik
      - "${PORT:-8000}:${PORT:-8000}"
      # - "${MQTT_TCP_PORT:-1883}:1883"
      # - "${MQTT_WS_PORT:-1884}:1884"
    environment:
      - PORT=${PORT:-8000}
      - JWT_SECRET=${JWT_SECRET}
      - RETENTION_MAX_DAYS=${RETENTION_MAX_DAYS:-7}
      - RETENTION_CHECK_HOURS=${RETENTION_CHECK_HOURS:-1}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - SERVER_URL=https://${DOMAIN:-datum.localhost}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      # External Database Configuration
      # Set DATABASE_URL in .env to connect to an external PostgreSQL
      # format: postgres://user:pass@host:5432/dbname?sslmode=disable
      - DATABASE_URL=${DATABASE_URL}
      - DATA_DIR=./data
    volumes:
      - ${DATA_DIR:-../data}:/root/data
      - ./firmware:/root/firmware
    env_file:
      - .env
    networks:
      - default
      - int_docker
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"

      # HTTP Router
      - "traefik.http.routers.datum-server.rule=Host(`${DOMAIN:-datum.localhost}`)"
      - "traefik.http.routers.datum-server.entrypoints=${TRAEFIK_ENTRYPOINT_HTTP:-web80}"
      - "traefik.http.routers.datum-server.service=datum-server"

      # HTTPS Router
      - "traefik.http.routers.datum-server-secure.rule=Host(`${DOMAIN:-datum.localhost}`)"
      - "traefik.http.routers.datum-server-secure.entrypoints=${TRAEFIK_ENTRYPOINT_HTTPS:-websecure}"
      - "traefik.http.routers.datum-server-secure.tls=true"
      - "traefik.http.routers.datum-server-secure.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.datum-server-secure.service=datum-server"

      # Service
      - "traefik.http.services.datum-server.loadbalancer.server.port=8000"

      # WebSocket Support
      - "traefik.http.services.datum-server.loadbalancer.passhostheader=true"
      - "traefik.http.middlewares.datum-ws.headers.customrequestheaders.Connection=Upgrade"
      - "traefik.http.middlewares.datum-ws.headers.customrequestheaders.Upgrade=websocket"
      - "traefik.http.routers.datum-server-secure.middlewares=datum-ws"

      # HTTP to HTTPS redirect
      - "traefik.http.middlewares.datum-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.datum-redirect.redirectscheme.permanent=true"
      - "traefik.http.routers.datum-server.middlewares=datum-redirect"

      # --- MQTT TCP (1883) ---
      - "traefik.tcp.routers.datum-mqtt.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.datum-mqtt.entrypoints=mqtt"
      - "traefik.tcp.routers.datum-mqtt.service=datum-mqtt"
      - "traefik.tcp.services.datum-mqtt.loadbalancer.server.port=1883"

      # --- MQTT MQTTS (8883) ---
      - "traefik.tcp.routers.datum-mqtts.rule=HostSNI(`${DOMAIN:-datum.localhost}`)"
      - "traefik.tcp.routers.datum-mqtts.entrypoints=mqtts"
      - "traefik.tcp.routers.datum-mqtts.tls=true"
      - "traefik.tcp.routers.datum-mqtts.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.tcp.routers.datum-mqtts.service=datum-mqtts"
      - "traefik.tcp.services.datum-mqtts.loadbalancer.server.port=1883"

      # --- MQTT WSS (1884) ---
      - "traefik.http.routers.datum-mqttws.rule=Host(`${DOMAIN:-datum.localhost}`)"
      - "traefik.http.routers.datum-mqttws.entrypoints=mqttws"
      - "traefik.http.routers.datum-mqttws.tls=true"
      - "traefik.http.routers.datum-mqttws.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.datum-mqttws.service=datum-mqttws"
      - "traefik.http.services.datum-mqttws.loadbalancer.server.port=1884"
      - "traefik.http.middlewares.mqtt-ws.headers.customrequestheaders.Connection=Upgrade"
      - "traefik.http.middlewares.mqtt-ws.headers.customrequestheaders.Upgrade=websocket"
      - "traefik.http.routers.datum-mqttws.middlewares=mqtt-ws"

networks:
  int_docker:
    name: ${TRAEFIK_NETWORK:-proxy}
    external: true
