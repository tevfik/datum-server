services:
  # Go API Server (Main backend)
  api:
    build: ./backend/go
    ports:
      - "8007:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=8000
      - RETENTION_MAX_DAYS=7 # Days to keep data
      - RETENTION_CHECK_HOURS=1 # Hours between cleanup runs
      - RATE_LIMIT_REQUESTS=100000 # Very high limit for testing system capacity
      - RATE_LIMIT_WINDOW_SECONDS=60
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Python Analytics Service
  analytics:
    build: ./backend/python
    ports:
      - "8001:8001"
    environment:
      - GO_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; exit(0) if httpx.get('http://localhost:8001/health').status_code == 200 else exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
  
  # Dashboard Service
  dashboard:
    build:
      context: ./backend/python
      dockerfile: Dockerfile.dashboard
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000
      - PANEL_WEBSOCKET_ORIGIN=localhost:3000
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  data:
