services:
  # Traefik Reverse Proxy
  traefik:
    image: traefik:v2.10
    container_name: datum-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--log.level=${TRAEFIK_LOG_LEVEL:-INFO}"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Traefik dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "${LETSENCRYPT_DIR:-./letsencrypt}:/letsencrypt"
    networks:
      - datum-network
    restart: unless-stopped

  # Redis (Data caching & task queue)
  redis:
    image: redis:7-alpine
    container_name: datum-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - datum-network
    restart: unless-stopped

  # MinIO (S3-compatible object storage)
  minio:
    image: minio/minio:RELEASE.2023-10-16T04-13-43Z
    container_name: datum-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-datum}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-datum123}
    volumes:
      - minio_data:/data
    networks:
      - datum-network
    restart: unless-stopped

  # Go API Server (Main backend)
  datum-server:
    image: datum-server:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: datum-server
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ../firmware:/app/firmware
    depends_on:
      - redis
      - minio
    env_file:
      - .env
    environment:
      - PORT=${PORT:-8000}
      - JWT_SECRET=${JWT_SECRET}
      - RETENTION_MAX_DAYS=${RETENTION_MAX_DAYS:-7}
      - RETENTION_CHECK_HOURS=${RETENTION_CHECK_HOURS:-1}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - SERVER_URL=https://${DOMAIN:-datum.localhost}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - DATA_DIR=./data
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - datum-network
    labels:
      - "traefik.enable=true"
      # HTTP router
      - "traefik.http.routers.datum-server.rule=Host(`${DOMAIN:-datum.localhost}`)"
      - "traefik.http.routers.datum-server.entrypoints=${TRAEFIK_ENTRYPOINT_HTTP:-web}"
      # HTTPS router
      - "traefik.http.routers.datum-server-secure.rule=Host(`${DOMAIN:-datum.localhost}`)"
      - "traefik.http.routers.datum-server-secure.entrypoints=${TRAEFIK_ENTRYPOINT_HTTPS:-websecure}"
      - "traefik.http.routers.datum-server-secure.tls=true"
      - "traefik.http.routers.datum-server-secure.tls.certresolver=letsencrypt"
      # WebSocket support (critical for streaming)
      - "traefik.http.services.datum-server.loadbalancer.server.port=8000"
      - "traefik.http.services.datum-server.loadbalancer.passhostheader=true"
      - "traefik.http.middlewares.datum-ws.headers.customrequestheaders.Connection=Upgrade"
      - "traefik.http.middlewares.datum-ws.headers.customrequestheaders.Upgrade=websocket"
      - "traefik.http.routers.datum-server-secure.middlewares=datum-ws"
      # HTTP to HTTPS redirect
      - "traefik.http.middlewares.datum-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.datum-redirect.redirectscheme.permanent=true"
      - "traefik.http.routers.datum-server.middlewares=datum-redirect"
    restart: unless-stopped

networks:
  datum-network:
    driver: bridge

# Volumes are now managed as host directories for easier backup
# See .env.example for DATA_DIR and LETSENCRYPT_DIR configuration
