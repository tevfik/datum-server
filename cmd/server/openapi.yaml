  /dev/{device_id}/data:
    post:
      summary: Send data (device)
      tags: [Data]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataPayload'
      responses:
        '200':
          description: Data received
    get:
      summary: Get data (latest or history)
      description: |
        Get latest data point (default) or query historical time-series data using parameters.
        
        **Latest Data:**
        Call without query parameters. Returns a single data object.
        
        **Historical Data:**
        Call with `limit`, `start`, `stop`, `range`, or `int` parameters. Returns a list of data objects.
        
        **Time Range Options (mutually exclusive):**
        - `range`: Duration backwards from now (e.g., `1h`, `24h`, `7d`, `30d`)
        - `start` + `stop`: Unix timestamp (ms) with duration
        - `start_rfc` + `end_rfc`: RFC3339 formatted timestamps
        
        **Aggregation:**
        Use `int` parameter to aggregate data into buckets (e.g., `1m`, `1h`, `1d`)
      tags: [Data]
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of data points to return (triggers history mode). Server-side maximum is configurable via QUERY_MAX_LIMIT env var (default 10000).
          schema:
            type: integer
            default: 100
            maximum: 10000
        - name: range
          in: query
          description: Duration backwards from now (e.g., 1h, 24h, 7d, 30d)
          schema:
            type: string
          examples:
            oneHour:
              value: "1h"
              summary: Last 1 hour
            oneDay:
              value: "24h"
              summary: Last 24 hours
            oneWeek:
              value: "7d"
              summary: Last 7 days
        - name: start
          in: query
          description: Start time as Unix timestamp in milliseconds
          schema:
            type: integer
            format: int64
        - name: stop
          in: query
          description: Duration from start (e.g., 1h, 1d, 1m, 1s)
          schema:
            type: string
        - name: start_rfc
          in: query
          description: Start time in RFC3339 format (e.g., 2024-01-01T00:00:00Z)
          schema:
            type: string
            format: date-time
        - name: end_rfc
          in: query
          description: End time in RFC3339 format (e.g., 2024-01-02T00:00:00Z)
          schema:
            type: string
            format: date-time
        - name: int
          in: query
          description: Aggregation interval for averaging data (e.g., 1m, 1h, 1d)
          schema:
            type: string
          examples:
            oneMinute:
              value: "1m"
              summary: Aggregate per minute
            oneHour:
              value: "1h"
              summary: Aggregate per hour
            oneDay:
              value: "1d"
              summary: Aggregate per day
      responses:
        '200':
          description: Latest data point OR List of historical data points
          content:
            application/json:
              schema:
                oneOf:
                  # Latest Data Response
                  - type: object
                    properties:
                      device_id:
                        type: string
                      timestamp:
                        type: string
                      data:
                        type: object
                  # History Data Response
                  - type: object
                    properties:
                      device_id:
                        type: string
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            timestamp:
                              type: string
                              format: date-time
                            timestamp_ms:
                              type: integer
                              format: int64
                            values:
                              type: object
                              additionalProperties:
                                type: number
                            count:
                              type: integer
                              description: Number of aggregated points (when using int parameter)







