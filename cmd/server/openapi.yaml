openapi: 3.0.3
info:
  title: Datum IoT Platform API
  description: |
    High-performance IoT data ingestion and device management platform with mobile-ready auth.

    ## Authentication
    - **User Auth**: JWT token in `Authorization: Bearer {token}` header
    - **Device Auth**: API key in `Authorization: Bearer {api_key}` header
    - **OAuth**: Google and GitHub via `GET /auth/oauth/{provider}` (PKCE supported for mobile)

    ## Token Lifecycle
    - **Access token**: 15-minute JWT — use for all authenticated API calls
    - **Refresh token**: 30-day rotating token — use `POST /auth/refresh` to get a new pair
    - **Sessions**: Each login creates a session; list with `GET /auth/sessions`, revoke with `POST /auth/logout`

    ## Push Notifications (ntfy)
    When `NTFY_URL` is configured, each user has a private ntfy topic returned by `GET /auth/me` as `ntfy_topic`.
    Subscribe to `{NTFY_URL}/{ntfy_topic}` in the ntfy app or via the ntfy SDK.

    Required env vars:
    - `NTFY_URL` — ntfy server base URL (e.g. `https://ntfy.sh` or self-hosted)
    - `NTFY_TOKEN` — optional bearer token for authenticated ntfy servers

    ## OAuth Social Login
    Supports Google and GitHub. Configure via env vars:
    - `OAUTH_GOOGLE_CLIENT_ID` / `OAUTH_GOOGLE_CLIENT_SECRET`
    - `OAUTH_GITHUB_CLIENT_ID` / `OAUTH_GITHUB_CLIENT_SECRET`

    ## Quick Start
    - **Register user**: `POST /auth/register`
    - **Create device**: `POST /dev`
    - **Send data (HTTP)**: `POST /dev/{device_id}/data`

    ## MQTT / IoT Integration
    For real-time data and low-overhead communication, use MQTT:

    ### Brokers:
    - **TCP**: Port 1883 (Local/Internal)
    - **MQTTS**: Port 8883 (Secure TLS)
    - **WS**: Port 1884 (WebSocket - via Traefik/Nginx)

    ### Authentication:
    - **Username**: `{device_id}`
    - **Password**: `{api_key}`

    ### Topics:
    - **Data (Pub)**: `dev/{device_id}/data`
    - **Commands (Sub)**: `dev/{device_id}/cmd`
    - **Firmware (Sub)**: `dev/{device_id}/fw`

    ## Common Headers
    All responses include an `X-Request-ID` header (UUID v4) for request correlation. Provide your own or the server generates one.

    ## API Versioning
    All endpoints are available under both root paths and `/api/v1/` prefix.
    Example: `POST /auth/login` is also available at `POST /api/v1/auth/login`.

    ## Rate Limiting
    All endpoints are rate-limited per IP (default: 100 requests/60 seconds).
    When exceeded, the server returns `429 Too Many Requests`.

    ## Rule Engine
    Configure data-driven rules via `POST /admin/rules`. Rules evaluate incoming
    telemetry and can trigger webhooks, MQTT messages, or log entries.

    ## Request Limits
    - **Max Body**: 5 MB (configurable via `MAX_REQUEST_BODY_BYTES`)
    - **Query Limit**: 10,000 data points per query (configurable via `QUERY_MAX_LIMIT`)
    - **Batch Limit**: 50,000 data points per ingestion batch (fixed)
  version: 1.9.0
  contact:
    name: API Support
  license:
    name: MIT

servers:
  - url: https://datum.bezg.in
    description: Production Server
  - url: https://datum.bezg.in/api/v1
    description: Production Server (API v1)
  - url: http://localhost:8000
    description: Local development
  - url: http://localhost:8000/api/v1
    description: Local development (API v1)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User Authentication. Accepts standard JWT Access Token (via Login) OR Persistent User API Key (starts with `ak_`).
    ApiKeyAuth:
      type: http
      scheme: bearer
      description: Device Authentication. Accepts Device API Key (starts with `sk_`) OR Dynamic Device Token (starts with `dk_`).

  headers:
    X-Request-ID:
      description: Unique request identifier (UUID v4). The server generates one if the client does not provide it. Useful for log correlation and debugging.
      schema:
        type: string
        format: uuid

  parameters:
    QueryLimit:
      name: limit
      in: query
      required: false
      description: Maximum number of data points to return. Server-side maximum is configurable via `QUERY_MAX_LIMIT` (default 10000).
      schema:
        type: integer
        default: 10000
        maximum: 10000

  responses:
    BadRequest:
      description: Bad Request — malformed JSON, missing required fields, or failed validation.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: "invalid request body" }
    Unauthorized:
      description: Unauthorized — missing, invalid or expired authentication credentials.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: "unauthorized" }
    Forbidden:
      description: Forbidden — authenticated but lacking permission for this resource.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: "forbidden" }
    NotFound:
      description: Not Found — resource does not exist or is not accessible to the caller.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: "not found" }
    Conflict:
      description: Conflict — resource already exists or current state prevents the operation.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: "already exists" }
    UnprocessableEntity:
      description: Unprocessable Entity — semantically invalid input.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: "validation failed" }
    TooManyRequests:
      description: Too Many Requests — rate limit exceeded. Retry after the period in the `Retry-After` header.
      headers:
        Retry-After:
          description: Seconds until the client may retry.
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: "rate limit exceeded" }
    InternalError:
      description: Internal Server Error — unexpected server failure. Includes a request ID for log correlation.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: "internal server error" }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message. Stable identifier strings will be added in a future revision.
        code:
          type: string
          description: Optional machine-readable error code (reserved for future use).
        request_id:
          type: string
          description: Correlates with the `X-Request-ID` response header.

    StorageObject:
      type: object
      properties:
        bucket: { type: string }
        path: { type: string }
        size: { type: integer, format: int64 }
        content_type: { type: string }
        etag: { type: string }
        last_modified: { type: string, format: date-time }
        owner_id: { type: string }
        metadata:
          type: object
          additionalProperties: { type: string }

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    CreateKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    KeyResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
        created_at:
          type: string
          format: date-time

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT access token (valid ~15 minutes)
        refresh_token:
          type: string
          description: Refresh token (valid 30 days); use POST /auth/refresh to rotate
        user_id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
        expires_at:
          type: string
          format: date-time

    UserProfile:
      type: object
      properties:
        user_id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
        display_name:
          type: string
        status:
          type: string
        ntfy_topic:
          type: string
          description: ntfy.sh topic to subscribe to for push notifications (only present when NTFY_URL is configured)
        created_at:
          type: string
          format: date-time

    Session:
      type: object
      properties:
        jti:
          type: string
          description: JWT ID — unique session identifier
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        user_agent:
          type: string
        ip:
          type: string

    PushToken:
      type: object
      properties:
        id:
          type: string
        platform:
          type: string
          enum: [ios, android, web, ntfy]
        token:
          type: string
        created_at:
          type: string
          format: date-time

    DeviceCreateRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [temperature, humidity, weather, actuator, sensor]

    DeviceResponse:
      type: object
      properties:
        device_id:
          type: string
        name:
          type: string
        type:
          type: string
        api_key:
          type: string
        status:
          type: string
        last_seen:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        thing_description:
          type: object
          description: Web of Things (WoT) Thing Description
          additionalProperties: true
        shadow_state:
          type: object
          description: Last reported state (Read Only)
          additionalProperties: true
        desired_state:
          type: object
          description: Desired configuration (Remote Config)
          additionalProperties: true

    DataPayload:
      type: object
      additionalProperties: true
      example:
        temperature: 25.5
        humidity: 60

    CommandRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
        params:
          type: object
    
    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
        new_password:
          type: string
          minLength: 8

    RegisterDeviceRequest:
      type: object
      required: [device_uid, device_name]
      properties:
        device_uid:
          type: string
          description: Hardware UID (MAC address or Serial)
        device_name:
          type: string
        device_type:
          type: string
        auth_mode:
          type: string
          enum: [static, rotating]
          default: static
          description: Authentication security mode
        wifi_ssid:
          type: string
        wifi_pass:
          type: string

    RegisterDeviceResponse:
      type: object
      properties:
        request_id:
          type: string
        device_uid:
          type: string
        device_id:
          type: string
        api_key:
          type: string
          description: Returned only for static auth mode
        master_secret:
          type: string
          description: Returned only for rotating auth mode
        status:
          type: string

        activate_url:
          type: string
        expires_at:
          type: string
          format: date-time

    DeviceActivateRequest:
      type: object
      required: [device_uid]
      properties:
        device_uid:
          type: string
        firmware_version:
          type: string
        model:
          type: string
    
    DeviceActivateResponse:
      type: object
      properties:
        device_id:
          type: string
        api_key:
          type: string
        server_url:
          type: string
        wifi_ssid:
          type: string
        wifi_pass:
          type: string

    SetupRequest:
      type: object
      required: [platform_name, admin_email, admin_password]
      properties:
        platform_name:
          type: string
        admin_email:
          type: string
          format: email
        admin_password:
          type: string
          minLength: 8
        allow_register:
          type: boolean
        data_retention:
          type: integer
          description: Data retention in days
          
    UpdateRetentionRequest:
      type: object
      required: [days, check_interval_hours]
      properties:
        days:
          type: integer
          minimum: 1
          maximum: 365
        check_interval_hours:
          type: integer
          minimum: 1
          maximum: 24
          
    UpdateRateLimitRequest:
      type: object
      required: [max_requests, window_seconds]
      properties:
        max_requests:
          type: integer
          minimum: 10
        window_seconds:
          type: integer
          minimum: 1
          
    UpdateAlertConfigRequest:
      type: object
      properties:
        email_enabled:
          type: boolean
        disk_threshold:
          type: integer
          minimum: 10
          maximum: 95
        memory_threshold:
          type: integer
          minimum: 10
          maximum: 95
          
    UpdateRegistrationRequest:
      type: object
      properties:
        allow_register:
          type: boolean

    CreateUserRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [admin, user]

    ProvisionDeviceRequest:
      type: object
      required: [name]
      properties:
        device_id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [temperature, humidity, weather, actuator, sensor]
          
    LogEntry:
      type: object
      properties:
        raw:
          type: string
          description: Raw log line content
        timestamp:
          type: string
          format: date-time
        level:
          type: string
        message:
          type: string

    CheckUIDResponse:
      type: object
      properties:
        registered:
          type: boolean
        device_id:
          type: string
        has_pending:
          type: boolean
        request_id:
          type: string

    Rule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        device_id:
          type: string
          description: Optional device filter (legacy/shortcut)
        trigger:
          $ref: '#/components/schemas/RuleTrigger'
        logic:
          $ref: '#/components/schemas/RuleLogic'
        actions:
          type: array
          items:
            $ref: '#/components/schemas/RuleAction'
        enabled:
          type: boolean
        fire_count:
          type: integer
        last_fired:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
      required: [name, trigger, logic, actions]

    RuleTrigger:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [on_data, scheduled, manual]
        schedule:
          type: string
          description: Cron expression (for scheduled trigger)
        device_id:
          type: string
          description: Specific device to trigger on (for on_data)

    RuleLogic:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [conditions, blockly, lua]
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/RuleCondition'
        logic_op:
          type: string
          enum: [and, or]
          default: and
        blockly_json:
          type: object
          description: Raw Blockly workspace JSON
        lua_script:
          type: string
          description: Sandboxed Lua code

    RuleCondition:
      type: object
      required: [field, operator, value]
      properties:
        field:
          type: string
        operator:
          type: string
          enum: [gt, gte, lt, lte, eq, neq, contains]
        value: {}

    RuleAction:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [log, notify, webhook, mqtt, command]
        config:
          type: object

    DeviceInfo:
      type: object
      properties:
        device_id:
          type: string
        device_name:
          type: string
        properties:
          type: array
          items:
            $ref: '#/components/schemas/DeviceProperty'

    DeviceProperty:
      type: object
      properties:
        key:
          type: string
        title:
          type: string

    PackManifest:
      type: object
      description: Knowledge pack manifest as declared in pack.yaml.
      properties:
        id:
          type: string
          description: Unique pack identifier (e.g. `crops-tr`)
        version:
          type: string
          description: Semantic version string
        schema_version:
          type: integer
          description: Pack schema version (bumped on breaking manifest changes)
        locale:
          type: string
          description: BCP 47 language tag (e.g. `tr`)
        title:
          type: string
          description: Human-readable display name
        description:
          type: string
        tier:
          type: string
          enum: [free, premium]
          description: Access tier controlling gateway authorization
        content_files:
          type: array
          items:
            type: string
          description: YAML data file names relative to pack directory
        etag:
          type: string
          description: SHA-256[:12] content hash — changes whenever the pack changes
        search:
          type: object
          properties:
            fields:
              type: array
              items:
                type: string
              description: Item fields used for substring search
            semantic:
              type: boolean
              description: Whether semantic (vector) search is available
        app_hints:
          type: array
          items:
            type: object
            properties:
              app:
                type: string
              required:
                type: boolean
              auto_load:
                type: boolean
          description: Per-app metadata hints

paths:
  /:
    get:
      summary: API Info
      tags: [System]
      responses:
        '200':
          description: API information

  /notify/{topic}:
    post:
      summary: Publish a notification message (ntfy-protocol compatible)
      description: |
        Publishes a message to the embedded ntfy-protocol broker.
        Compatible with existing ntfy mobile/desktop clients.
        Optional headers: `Title`, `Priority` (min|low|default|high|max), `Tags` (comma-separated).
      tags: [Notifications]
      parameters:
        - name: topic
          in: path
          required: true
          schema: { type: string }
        - name: Title
          in: header
          required: false
          schema: { type: string }
        - name: Priority
          in: header
          required: false
          schema: { type: string, enum: [min, low, default, high, max] }
        - name: Tags
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: false
        content:
          text/plain:
            schema: { type: string }
      responses:
        '200':
          description: Message published
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:       { type: string }
                  time:     { type: integer }
                  event:    { type: string, example: message }
                  topic:    { type: string }
                  title:    { type: string }
                  message:  { type: string }
                  priority: { type: integer }
                  tags:     { type: array, items: { type: string } }
        '413': { description: Message too large (>4 KiB) }

  /notify/{topic}/json:
    get:
      summary: Subscribe to a topic (newline-delimited JSON stream)
      tags: [Notifications]
      parameters:
        - name: topic
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Long-lived NDJSON stream
          content:
            application/x-ndjson: { schema: { type: string } }

  /notify/{topic}/sse:
    get:
      summary: Subscribe to a topic (Server-Sent Events)
      tags: [Notifications]
      parameters:
        - name: topic
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream: { schema: { type: string } }

  /notify/{topic}/raw:
    get:
      summary: Subscribe to a topic (newline-delimited message bodies)
      tags: [Notifications]
      parameters:
        - name: topic
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Plain-text stream
          content:
            text/plain: { schema: { type: string } }

  # ---------- Object Storage (Buckets — Phase 3) ----------
  /storage:
    get:
      summary: List buckets
      tags: [Storage]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Bucket list
          content:
            application/json:
              schema:
                type: object
                properties:
                  buckets: { type: array, items: { type: string } }

  /storage/{bucket}:
    parameters:
      - name: bucket
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Create (or ensure) a bucket
      tags: [Storage]
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Bucket exists }
        '400': { $ref: '#/components/responses/BadRequest' }
    delete:
      summary: Delete an empty bucket
      tags: [Storage]
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Deleted }
        '400': { $ref: '#/components/responses/BadRequest' }
    get:
      summary: List objects in a bucket
      tags: [Storage]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: prefix
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 10000 }
      responses:
        '200':
          description: Object list
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }
                  objects:
                    type: array
                    items: { $ref: '#/components/schemas/StorageObject' }

  /storage/{bucket}/{path}:
    parameters:
      - name: bucket
        in: path
        required: true
        schema: { type: string }
      - name: path
        in: path
        required: true
        schema: { type: string }
        description: Slash-delimited object key
    put:
      summary: Upload an object
      tags: [Storage]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StorageObject' }
        '400': { $ref: '#/components/responses/BadRequest' }
    get:
      summary: Download an object (auth or presigned URL)
      tags: [Storage]
      parameters:
        - name: sig
          in: query
          schema: { type: string }
          description: Presigned signature (when present, replaces auth)
        - name: expires
          in: query
          schema: { type: integer }
          description: Expiry timestamp (unix seconds)
      responses:
        '200':
          description: Object bytes
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '404': { $ref: '#/components/responses/NotFound' }
    head:
      summary: Stat an object
      tags: [Storage]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Headers only }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: Delete an object
      tags: [Storage]
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Deleted }

  /storage/{bucket}/presign:
    post:
      summary: Create a presigned URL
      tags: [Storage]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
                method: { type: string, enum: [GET, PUT, DELETE], default: GET }
                expires_secs: { type: integer, default: 900 }
      responses:
        '200':
          description: URL response
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string, format: uri }
                  expires_secs: { type: integer }

  /sys/time:
    get:
      summary: Get system time
      description: Returns current server time in Unix and ISO8601 formats. Useful for Christian's Algorithm time sync.
      tags: [System]
      responses:
        '200':
          description: Current time
          content:
            application/json:
              schema:
                type: object
                properties:
                  unix:
                    type: integer
                    format: int64
                    description: Unix timestamp in seconds
                  unix_ms:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds
                  timestamp:
                    type: integer
                    format: int64
                    description: Unix timestamp in nanoseconds
                  iso8601:
                    type: string
                    format: date-time


  /sys/ip:
    get:
      summary: Get client public IP
      description: |
        Returns the public IP address of the calling client. The server prefers
        proxy headers (`CF-Connecting-IP`, `True-Client-IP`, `X-Real-IP`,
        `X-Forwarded-For` left-most entry) over the immediate transport
        address, so callers behind a reverse proxy still see their real IP.

        - `Accept: application/json` → `{ "ip": "1.2.3.4" }`
        - default → `text/plain` body containing only the IP
      tags: [System]
      responses:
        '200':
          description: Client public IP
          content:
            text/plain:
              schema:
                type: string
                example: "203.0.113.42"
            application/json:
              schema:
                type: object
                properties:
                  ip: { type: string, example: "203.0.113.42" }


  /sys/status:
    get:
      summary: Get system status
      tags: [System]
      responses:
        '200':
          description: System status
