    post:
      summary: Send public data (no auth)
      tags: [Public]
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataPayload'
      responses:
        '200':
          description: Data received
    get:
      summary: Get public data (latest or history)
      description: |
        Get public data without authentication.
        
        **Latest Data:**
        Call without query parameters. Returns a single data object.
        
        **Historical Data:**
        Call with `limit` parameter. Returns a list of data objects.
      tags: [Public]
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of data points to return (triggers history mode). Server-side maximum is configurable via QUERY_MAX_LIMIT env var (default 10000).
          schema:
            type: integer
            default: 100
            maximum: 10000
      responses:
        '200':
          description: Latest data OR list of historical data

  /dev/{device_id}/cmd/stream:
    get:
      summary: SSE stream for real-time commands
      description: |
        Server-Sent Events (SSE) endpoint for real-time command delivery.
        Keeps connection open and pushes commands as they arrive.
        Battery-optimized for IoT devices.
        
        **Event Types:**
        - `command`: New command received
        - `ping`: Keep-alive (every 30s)
      tags: [Commands]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: command
                data: {"id":"cmd123","action":"reboot","params":{}}
                
                event: ping
                data: {"time":"2024-01-01T12:00:00Z"}


