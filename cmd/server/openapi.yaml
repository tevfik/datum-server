          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRateLimitRequest'
      responses:
        '200':
          description: Rate limit updated

  /admin/config/alerts:
    put:
      summary: Update alert settings
      tags: [Admin]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAlertConfigRequest'
      responses:
        '200':
          description: Alerts updated

  /admin/config/registration:
    put:
      summary: Update registration settings
      tags: [Admin]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRegistrationRequest'
      responses:
        '200':
          description: Registration updated

  /admin/mqtt/stats:
    get:
      summary: Get MQTT broker statistics
      tags: [Admin]
      responses:
        '200':
          description: Broker statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  bytes_recv:
                    type: integer
                  bytes_sent:
                    type: integer
                  clients_connected:
                    type: integer
                  subscriptions:
                    type: integer
                  inflight:
                    type: integer

  /admin/mqtt/clients:
    get:
      summary: List connected MQTT clients
      tags: [Admin]
      responses:
        '200':
          description: List of connected clients
          content:
            application/json:
              schema:
                type: object
                properties:
                  clients:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        ip:
                          type: string
                        connected:
                          type: boolean

  /admin/mqtt/publish:
    post:
      summary: Publish MQTT message
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [topic, message]
              properties:
                topic:
                  type: string
                message:
                  type: string
                retain:
                  type: boolean
      responses:
        '200':
          description: Message published
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /db/{collection}:
    post:
      summary: Create Document
      tags: [Database]
      security:
        - BearerAuth: []
      parameters:
        - name: collection
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: Document created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
    get:
      summary: List Documents
      tags: [Database]
      security:
        - BearerAuth: []
      parameters:
        - name: collection
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true

  /db/{collection}/{id}:
    get:
      summary: Get Document
      tags: [Database]
      security:
        - BearerAuth: []
      parameters:
        - name: collection
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document found
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: Document not found
    put:
      summary: Update Document
      tags: [Database]
      security:
        - BearerAuth: []
      parameters:
        - name: collection
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Document updated
    delete:
      summary: Delete Document
      tags: [Database]
      security:
        - BearerAuth: []
      parameters:
        - name: collection
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document deleted


  /sys/info:
    get:
      summary: Get system information
      tags: [System]
      responses:
        '200':
          description: System information including version and build date
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  build_date:
                    type: string
                  go_version:
                    type: string
                  os:
                    type: string
                  arch:
                    type: string

  # --- Health & Readiness ---
  /health:
    get:
      summary: Health check
      description: Returns service health status including storage, MQTT, and telemetry processor state.
      tags: [System]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded, unhealthy]
                  storage:
                    type: string
                  mqtt:
                    type: string
                  mqtt_clients:
                    type: integer
                  telemetry_buffer_usage:
                    type: string
                  uptime_seconds:
                    type: integer
                  version:
                    type: string
        '503':
          description: Service is unhealthy or degraded

  /ready:
    get:
      summary: Readiness check
      description: Returns whether the service is ready to handle requests.
      tags: [System]
      responses:
        '200':
          description: Service is ready
        '503':
          description: Service is not ready

  /live:
    get:
      summary: Liveness check
      tags: [System]
      responses:
        '200':
          description: Service is alive

  # --- Rule Engine ---
  /admin/rules:
    get:
      summary: List all rules
      tags: [Rules]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      $ref: '#/components/schemas/Rule'
    post:
      summary: Create a new rule
      tags: [Rules]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Rule'
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'

  /admin/rules/{rule_id}:
    get:
      summary: Get rule by ID
      tags: [Rules]
      security:
        - BearerAuth: []
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rule details
        '404':
          description: Rule not found
    delete:
      summary: Delete a rule
      tags: [Rules]
      security:
        - BearerAuth: []
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rule deleted

  /admin/rules/{rule_id}/enable:
    put:
      summary: Enable a rule
      tags: [Rules]
      security:
        - BearerAuth: []
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rule enabled

  /admin/rules/{rule_id}/disable:
    put:
      summary: Disable a rule
      tags: [Rules]
      security:
        - BearerAuth: []
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rule disabled

  # --- Metrics (Prometheus) ---
  /sys/metrics:
    get:
      summary: Get application metrics
      description: |
        Returns metrics in JSON or Prometheus text format.
        Use `?format=prometheus` for Prometheus scraping.
      tags: [System]
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [json, prometheus]
      responses:
        '200':
          description: Metrics response
