openapi: 3.0.3
info:
  title: Datumpy IoT Platform API
  description: |
    High-performance IoT data ingestion and device management platform.

    ## Authentication
    - **User Auth**: JWT token in `Authorization: Bearer {token}` header
    - **Device Auth**: API key in `Authorization: Bearer {api_key}` header

    ## Quick Start
    - **Register user**: `POST /auth/register`
    - **Create device**: `POST /dev`
    - **Send data (HTTP)**: `POST /dev/{device_id}/data`

    ## MQTT / IoT Integration
    For real-time data and low-overhead communication, use MQTT:

    ### Brokers:
    - **TCP**: Port 1883 (Local/Internal)
    - **MQTTS**: Port 8883 (Secure TLS)
    - **WS**: Port 1884 (WebSocket - via Traefik/Nginx)

    ### Authentication:
    - **Username**: `{device_id}`
    - **Password**: `{api_key}`

    ### Topics:
    - **Data (Pub)**: `dev/{device_id}/data`
    - **Commands (Sub)**: `dev/{device_id}/cmd`
    - **Firmware (Sub)**: `dev/{device_id}/fw`
  version: 1.1.0
  contact:
    name: API Support
  license:
    name: MIT

servers:
  - url: https://datum.bezg.in
    description: Production Server
  - url: http://localhost:8000
    description: Local development

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User Authentication. Accepts standard JWT Access Token (via Login) OR Persistent User API Key (starts with `ak_`).
    ApiKeyAuth:
      type: http
      scheme: bearer
      description: Device Authentication. Accepts Device API Key (starts with `sk_`) OR Dynamic Device Token (starts with `dk_`).

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    CreateKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    KeyResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
        created_at:
          type: string
          format: date-time

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user_id:
          type: string

    DeviceCreateRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [temperature, humidity, weather, actuator, sensor]

    DeviceResponse:
      type: object
      properties:
        device_id:
          type: string
        name:
          type: string
        type:
          type: string
        api_key:
          type: string
        status:
          type: string
        last_seen:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        thing_description:
          type: object
          description: Web of Things (WoT) Thing Description
          additionalProperties: true
        shadow_state:
          type: object
          description: Last reported state (Read Only)
          additionalProperties: true
        desired_state:
          type: object
          description: Desired configuration (Remote Config)
          additionalProperties: true

    DataPayload:
      type: object
      additionalProperties: true
      example:
        temperature: 25.5
        humidity: 60

    CommandRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
        params:
          type: object
    
    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
        new_password:
          type: string
          minLength: 8

    RegisterDeviceRequest:
      type: object
      required: [device_uid, device_name]
      properties:
        device_uid:
          type: string
          description: Hardware UID (MAC address or Serial)
        device_name:
          type: string
        device_type:
          type: string
        auth_mode:
          type: string
          enum: [static, rotating]
          default: static
          description: Authentication security mode
        wifi_ssid:
          type: string
        wifi_pass:
          type: string

    RegisterDeviceResponse:
      type: object
      properties:
        request_id:
          type: string
        device_uid:
          type: string
        device_id:
          type: string
        api_key:
          type: string
          description: Returned only for static auth mode
        master_secret:
          type: string
          description: Returned only for rotating auth mode
        status:
          type: string

        activate_url:
          type: string
        expires_at:
          type: string
          format: date-time

    DeviceActivateRequest:
      type: object
      required: [device_uid]
      properties:
        device_uid:
          type: string
        firmware_version:
          type: string
        model:
          type: string
    
    DeviceActivateResponse:
      type: object
      properties:
        device_id:
          type: string
        api_key:
          type: string
        server_url:
          type: string
        wifi_ssid:
          type: string
        wifi_pass:
          type: string

    SetupRequest:
      type: object
      required: [platform_name, admin_email, admin_password]
      properties:
        platform_name:
          type: string
        admin_email:
          type: string
          format: email
        admin_password:
          type: string
          minLength: 8
        allow_register:
          type: boolean
        data_retention:
          type: integer
          description: Data retention in days
          
    UpdateRetentionRequest:
      type: object
      required: [days, check_interval_hours]
      properties:
        days:
          type: integer
          minimum: 1
          maximum: 365
        check_interval_hours:
          type: integer
          minimum: 1
          maximum: 24
          
    UpdateRateLimitRequest:
      type: object
      required: [max_requests, window_seconds]
      properties:
        max_requests:
          type: integer
          minimum: 10
        window_seconds:
          type: integer
          minimum: 1
          
    UpdateAlertConfigRequest:
      type: object
      properties:
        email_enabled:
          type: boolean
        disk_threshold:
          type: integer
          minimum: 10
          maximum: 95
        memory_threshold:
          type: integer
          minimum: 10
          maximum: 95
          
    UpdateRegistrationRequest:
      type: object
      properties:
        allow_register:
          type: boolean

    CreateUserRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [admin, user]

    ProvisionDeviceRequest:
      type: object
      required: [name]
      properties:
        device_id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [temperature, humidity, weather, actuator, sensor]
          
    LogEntry:
      type: object
      properties:
        raw:
          type: string
          description: Raw log line content
        timestamp:
          type: string
          format: date-time
        level:
          type: string
        message:
          type: string

    CheckUIDResponse:
      type: object
      properties:
        registered:
          type: boolean
        device_id:
          type: string
        has_pending:
          type: boolean
        request_id:
          type: string

paths:
  /:
    get:
      summary: API Info
      tags: [System]
      responses:
        '200':
          description: API information

  /sys/time:
    get:
      summary: Get system time
      description: Returns current server time in Unix and ISO8601 formats. Useful for Christian's Algorithm time sync.
      tags: [System]
      responses:
        '200':
          description: Current time
          content:
            application/json:
              schema:
                type: object
                properties:
                  unix:
                    type: integer
                    format: int64
                    description: Unix timestamp in seconds
                  unix_ms:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds
                  timestamp:
                    type: integer
                    format: int64
                    description: Unix timestamp in nanoseconds
                  iso8601:
                    type: string
                    format: date-time


  /sys/ip:
    get:
      summary: Get system IP
      description: Returns the public IP address of the client as seen by the server.
      tags: [System]
      responses:
        '200':
          description: Client IP address
          content:
            text/plain:
              schema:
                type: string
                example: "127.0.0.1"


  /sys/status:
    get:
      summary: Get system status
      tags: [System]
      responses:
        '200':
          description: System status
          content:
            application/json:
              schema:
                type: object
                properties:
                  initialized:
                    type: boolean

  /sys/metrics:
    get:
      summary: Get system metrics
      description: Returns Prometheus-compatible metrics.
      tags: [System]
      responses:
        '200':
          description: Metrics text
          content:
            text/plain:
              schema:
                type: string

  /sys/setup:
    post:
      summary: Initialize system
      tags: [System]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupRequest'
      responses:
        '201':
          description: System initialized
        '409':
          description: Already initialized

  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: Healthy
        '503':
          description: Unhealthy

  /healthz:
    get:
      summary: Health check (alias)
      tags: [System]
      responses:
        '200':
          description: Healthy

  /live:
    get:
      summary: Liveness check
      tags: [System]
      responses:
        '200':
          description: Alive

  /ready:
    get:
      summary: Readiness check
      tags: [System]
      responses:
        '200':
          description: Ready
        '503':
          description: Not ready

  /auth/register:
    post:
      summary: Register new user
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: User already exists

  /auth/login:
    post:
      summary: Login user
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  /auth/keys:
    post:
      summary: Create User API Key
      tags: [Authentication]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKeyRequest'
      responses:
        '201':
          description: Key created (Save the key!)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyResponse'
    get:
      summary: List User API Keys
      tags: [Authentication]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/KeyResponse'

  /auth/keys/{id}:
    delete:
      summary: Revoke User API Key
      tags: [Authentication]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Key deleted

  /auth/forgot-password:
    post:
      summary: Request password reset email
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Email sent (if user exists)

  /auth/reset-password:
    post:
      summary: Complete password reset
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password updated

  /auth/password:
    put:
      summary: Change password
      tags: [Authentication]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed

  /auth/user:
    delete:
      summary: Delete account
      description: Permanently delete the authenticated user and all their devices/data.
      tags: [Authentication]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account deleted

  /dev/fw/{filename}:
    get:
      summary: Download Firmware (Secured)
      tags: [Devices]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Device API key
      responses:
        '200':
          description: Firmware binary
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary


  /dev:
    post:
      summary: Create device
      tags: [Devices]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCreateRequest'
      responses:
        '201':
          description: Device created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
    get:
      summary: List devices
      tags: [Devices]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of devices

  /dev/register:
    post:
      summary: Register device (Mobile App)
      tags: [Provisioning]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceRequest'
      responses:
        '201':
          description: Device registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterDeviceResponse'

  /dev/check-uid/{uid}:
    get:
      summary: Check if device UID is registered
      tags: [Provisioning]
      security:
        - BearerAuth: []
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckUIDResponse'

  /dev/prov:
    get:
      summary: List user provisioning requests
      tags: [Provisioning]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of requests

  /dev/prov/{request_id}:
    get:
      summary: Get provisioning request status
      tags: [Provisioning]
      security:
        - BearerAuth: []
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Request status
    delete:
      summary: Cancel provisioning request
      tags: [Provisioning]
      security:
        - BearerAuth: []
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cancelled

  /prov/activate:
    post:
      summary: Activate device (Device side)
      tags: [Provisioning]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceActivateRequest'
      responses:
        '200':
          description: Activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceActivateResponse'

  /prov/check/{uid}:
    get:
      summary: Check provisioning status (Device side)
      tags: [Provisioning]
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Status check

  /dev/{device_id}:
    get:
      summary: Get device details
      tags: [Devices]
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Device details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
    delete:
      summary: Delete device
      tags: [Devices]
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Device deleted

  /dev/{device_id}/thing-description:
    put:
      summary: Update Thing Description (WoT)
      tags: [Devices]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Thing Description updated

  /dev/{device_id}/config:
    get:
      summary: Get device details
      description: Returns device details, including Thing Description.
      tags: [Devices]
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Device details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
    delete:
      summary: Delete device
      tags: [Devices]
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Device deleted

  /dev/{device_id}/config:
    patch:
      summary: Update device configuration (Remote Config)
      description: Sets the desired configuration for the device. The server will sync this to the device via MQTT.
      tags: [Devices]
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: Configuration object (free JSON)
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example:
                motion_threshold: 45
                led_mode: "auto"
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: updated
                  config:
                    type: object

  /dev/{device_id}/cmd:
    post:
      summary: Send command to device
      tags: [Commands]
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandRequest'
      responses:
        '201':
          description: Command queued

  /dev/{device_id}/cmd/pending:
    get:
      summary: Poll for commands (device)
      tags: [Commands]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pending commands

  /dev/{device_id}/cmd/poll:
    get:
      summary: Long poll for commands
      tags: [Commands]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
        - name: wait
          in: query
          schema:
            type: integer
            default: 30
            maximum: 60
          description: Seconds to wait for commands
      responses:
        '200':
          description: Commands or timeout

  /dev/{device_id}/cmd/{command_id}/ack:
    post:
      summary: Acknowledge command execution
      tags: [Commands]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
        - name: command_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Command acknowledged


  /dev/{device_id}/stream/frame:
    post:
      summary: Upload video frame
      tags: [Streaming]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          image/jpeg:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Frame processed

  /dev/{device_id}/stream/mjpeg:
    get:
      summary: MJPEG Stream
      tags: [Streaming]
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: MJPEG Stream

  /dev/{device_id}/stream/snapshot:
    get:
      summary: Get current frame snapshot
      tags: [Streaming]
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: JPEG Image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary

  /dev/{device_id}/stream/ws:
    get:
      summary: WebSocket Stream
      tags: [Streaming]
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '101':
          description: WebSocket upgrade

  /dev/{device_id}/stream/info:
    get:
      summary: Stream Metadata
      tags: [Streaming]
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stream info
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean
                  fps:
                    type: number
                  width:
                    type: integer
                  height:
                    type: integer
  /data/{device_id}:
    post:
      summary: Ingest Telemetry Data
      tags: [Data]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataPayload'
      responses:
        '200':
          description: Data accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string}
                  commands_pending: {type: boolean}

    get:
      summary: Get Device Data (User Auth)
      tags: [Data]
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema: {type: integer}
        - name: start
          in: query
          schema: {type: string}
        - name: stop
          in: query
          schema: {type: string}
      responses:
        '200':
          description: Telemetry data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: {type: array, items: {$ref: '#/components/schemas/DataPayload'}}

  /dev/{device_id}/data:
    post:
      summary: Send data (device)
      tags: [Data]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataPayload'
      responses:
        '200':
          description: Data received
    get:
      summary: Get data (latest or history)
      description: |
        Get latest data point (default) or query historical time-series data using parameters.
        
        **Latest Data:**
        Call without query parameters. Returns a single data object.
        
        **Historical Data:**
        Call with `limit`, `start`, `stop`, `range`, or `int` parameters. Returns a list of data objects.
        
        **Time Range Options (mutually exclusive):**
        - `range`: Duration backwards from now (e.g., `1h`, `24h`, `7d`, `30d`)
        - `start` + `stop`: Unix timestamp (ms) with duration
        - `start_rfc` + `end_rfc`: RFC3339 formatted timestamps
        
        **Aggregation:**
        Use `int` parameter to aggregate data into buckets (e.g., `1m`, `1h`, `1d`)
      tags: [Data]
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of data points to return (triggers history mode)
          schema:
            type: integer
            default: 100
        - name: range
          in: query
          description: Duration backwards from now (e.g., 1h, 24h, 7d, 30d)
          schema:
            type: string
          examples:
            oneHour:
              value: "1h"
              summary: Last 1 hour
            oneDay:
              value: "24h"
              summary: Last 24 hours
            oneWeek:
              value: "7d"
              summary: Last 7 days
        - name: start
          in: query
          description: Start time as Unix timestamp in milliseconds
          schema:
            type: integer
            format: int64
        - name: stop
          in: query
          description: Duration from start (e.g., 1h, 1d, 1m, 1s)
          schema:
            type: string
        - name: start_rfc
          in: query
          description: Start time in RFC3339 format (e.g., 2024-01-01T00:00:00Z)
          schema:
            type: string
            format: date-time
        - name: end_rfc
          in: query
          description: End time in RFC3339 format (e.g., 2024-01-02T00:00:00Z)
          schema:
            type: string
            format: date-time
        - name: int
          in: query
          description: Aggregation interval for averaging data (e.g., 1m, 1h, 1d)
          schema:
            type: string
          examples:
            oneMinute:
              value: "1m"
              summary: Aggregate per minute
            oneHour:
              value: "1h"
              summary: Aggregate per hour
            oneDay:
              value: "1d"
              summary: Aggregate per day
      responses:
        '200':
          description: Latest data point OR List of historical data points
          content:
            application/json:
              schema:
                oneOf:
                  # Latest Data Response
                  - type: object
                    properties:
                      device_id:
                        type: string
                      timestamp:
                        type: string
                      data:
                        type: object
                  # History Data Response
                  - type: object
                    properties:
                      device_id:
                        type: string
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            timestamp:
                              type: string
                              format: date-time
                            timestamp_ms:
                              type: integer
                              format: int64
                            values:
                              type: object
                              additionalProperties:
                                type: number
                            count:
                              type: integer
                              description: Number of aggregated points (when using int parameter)







