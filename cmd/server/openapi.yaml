openapi: 3.0.3
info:
  title: Datumpy IoT Platform API
  description: |
    High-performance IoT data ingestion and device management platform with mobile-ready auth.

    ## Authentication
    - **User Auth**: JWT token in `Authorization: Bearer {token}` header
    - **Device Auth**: API key in `Authorization: Bearer {api_key}` header
    - **OAuth**: Google and GitHub via `GET /auth/oauth/{provider}` (PKCE supported for mobile)

    ## Token Lifecycle
    - **Access token**: 15-minute JWT — use for all authenticated API calls
    - **Refresh token**: 30-day rotating token — use `POST /auth/refresh` to get a new pair
    - **Sessions**: Each login creates a session; list with `GET /auth/sessions`, revoke with `POST /auth/logout`

    ## Push Notifications (ntfy)
    When `NTFY_URL` is configured, each user has a private ntfy topic returned by `GET /auth/me` as `ntfy_topic`.
    Subscribe to `{NTFY_URL}/{ntfy_topic}` in the ntfy app or via the ntfy SDK.

    Required env vars:
    - `NTFY_URL` — ntfy server base URL (e.g. `https://ntfy.sh` or self-hosted)
    - `NTFY_TOKEN` — optional bearer token for authenticated ntfy servers

    ## OAuth Social Login
    Supports Google and GitHub. Configure via env vars:
    - `OAUTH_GOOGLE_CLIENT_ID` / `OAUTH_GOOGLE_CLIENT_SECRET`
    - `OAUTH_GITHUB_CLIENT_ID` / `OAUTH_GITHUB_CLIENT_SECRET`

    ## Quick Start
    - **Register user**: `POST /auth/register`
    - **Create device**: `POST /dev`
    - **Send data (HTTP)**: `POST /dev/{device_id}/data`

    ## MQTT / IoT Integration
    For real-time data and low-overhead communication, use MQTT:

    ### Brokers:
    - **TCP**: Port 1883 (Local/Internal)
    - **MQTTS**: Port 8883 (Secure TLS)
    - **WS**: Port 1884 (WebSocket - via Traefik/Nginx)

    ### Authentication:
    - **Username**: `{device_id}`
    - **Password**: `{api_key}`

    ### Topics:
    - **Data (Pub)**: `dev/{device_id}/data`
    - **Commands (Sub)**: `dev/{device_id}/cmd`
    - **Firmware (Sub)**: `dev/{device_id}/fw`

    ## Common Headers
    All responses include an `X-Request-ID` header (UUID v4) for request correlation. Provide your own or the server generates one.

    ## API Versioning
    All endpoints are available under both root paths and `/api/v1/` prefix.
    Example: `POST /auth/login` is also available at `POST /api/v1/auth/login`.

    ## Rate Limiting
    All endpoints are rate-limited per IP (default: 100 requests/60 seconds).
    When exceeded, the server returns `429 Too Many Requests`.

    ## Rule Engine
    Configure data-driven rules via `POST /admin/rules`. Rules evaluate incoming
    telemetry and can trigger webhooks, MQTT messages, or log entries.

    ## Request Limits
    - **Max Body**: 5 MB (configurable via `MAX_REQUEST_BODY_BYTES`)
    - **Query Limit**: 10,000 data points per query (configurable via `QUERY_MAX_LIMIT`)
    - **Batch Limit**: 50,000 data points per ingestion batch (fixed)
  version: 1.8.0
  contact:
    name: API Support
  license:
    name: MIT

servers:
  - url: https://datum.bezg.in
    description: Production Server
  - url: https://datum.bezg.in/api/v1
    description: Production Server (API v1)
  - url: http://localhost:8000
    description: Local development
  - url: http://localhost:8000/api/v1
    description: Local development (API v1)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User Authentication. Accepts standard JWT Access Token (via Login) OR Persistent User API Key (starts with `ak_`).
    ApiKeyAuth:
      type: http
      scheme: bearer
      description: Device Authentication. Accepts Device API Key (starts with `sk_`) OR Dynamic Device Token (starts with `dk_`).

  headers:
    X-Request-ID:
      description: Unique request identifier (UUID v4). The server generates one if the client does not provide it. Useful for log correlation and debugging.
      schema:
        type: string
        format: uuid

  parameters:
    QueryLimit:
      name: limit
      in: query
      required: false
      description: Maximum number of data points to return. Server-side maximum is configurable via `QUERY_MAX_LIMIT` (default 10000).
      schema:
        type: integer
        default: 10000
        maximum: 10000

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    CreateKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    KeyResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
        created_at:
          type: string
          format: date-time

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT access token (valid ~15 minutes)
        refresh_token:
          type: string
          description: Refresh token (valid 30 days); use POST /auth/refresh to rotate
        user_id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
        expires_at:
          type: string
          format: date-time

    UserProfile:
      type: object
      properties:
        user_id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
        display_name:
          type: string
        status:
          type: string
        ntfy_topic:
          type: string
          description: ntfy.sh topic to subscribe to for push notifications (only present when NTFY_URL is configured)
        created_at:
          type: string
          format: date-time

    Session:
      type: object
      properties:
        jti:
          type: string
          description: JWT ID — unique session identifier
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        user_agent:
          type: string
        ip:
          type: string

    PushToken:
      type: object
      properties:
        id:
          type: string
        platform:
          type: string
          enum: [ios, android, web, ntfy]
        token:
          type: string
        created_at:
          type: string
          format: date-time

    DeviceCreateRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [temperature, humidity, weather, actuator, sensor]

    DeviceResponse:
      type: object
      properties:
        device_id:
          type: string
        name:
          type: string
        type:
          type: string
        api_key:
          type: string
        status:
          type: string
        last_seen:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        thing_description:
          type: object
          description: Web of Things (WoT) Thing Description
          additionalProperties: true
        shadow_state:
          type: object
          description: Last reported state (Read Only)
          additionalProperties: true
        desired_state:
          type: object
          description: Desired configuration (Remote Config)
          additionalProperties: true

    DataPayload:
      type: object
      additionalProperties: true
      example:
        temperature: 25.5
        humidity: 60

    CommandRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
        params:
          type: object
    
    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
        new_password:
          type: string
          minLength: 8

    RegisterDeviceRequest:
      type: object
      required: [device_uid, device_name]
      properties:
        device_uid:
          type: string
          description: Hardware UID (MAC address or Serial)
        device_name:
          type: string
        device_type:
          type: string
        auth_mode:
          type: string
          enum: [static, rotating]
          default: static
          description: Authentication security mode
        wifi_ssid:
          type: string
        wifi_pass:
          type: string

    RegisterDeviceResponse:
      type: object
      properties:
        request_id:
          type: string
        device_uid:
          type: string
        device_id:
          type: string
        api_key:
          type: string
          description: Returned only for static auth mode
        master_secret:
          type: string
          description: Returned only for rotating auth mode
        status:
          type: string

        activate_url:
          type: string
        expires_at:
          type: string
          format: date-time

    DeviceActivateRequest:
      type: object
      required: [device_uid]
      properties:
        device_uid:
          type: string
        firmware_version:
          type: string
        model:
          type: string
    
    DeviceActivateResponse:
      type: object
      properties:
        device_id:
          type: string
        api_key:
          type: string
        server_url:
          type: string
        wifi_ssid:
          type: string
        wifi_pass:
          type: string

    SetupRequest:
      type: object
      required: [platform_name, admin_email, admin_password]
      properties:
        platform_name:
          type: string
        admin_email:
          type: string
          format: email
        admin_password:
          type: string
          minLength: 8
        allow_register:
          type: boolean
        data_retention:
          type: integer
          description: Data retention in days
          
    UpdateRetentionRequest:
      type: object
      required: [days, check_interval_hours]
      properties:
        days:
          type: integer
          minimum: 1
          maximum: 365
        check_interval_hours:
          type: integer
          minimum: 1
          maximum: 24
          
    UpdateRateLimitRequest:
      type: object
      required: [max_requests, window_seconds]
      properties:
        max_requests:
          type: integer
          minimum: 10
        window_seconds:
          type: integer
          minimum: 1
          
    UpdateAlertConfigRequest:
      type: object
      properties:
        email_enabled:
          type: boolean
        disk_threshold:
          type: integer
          minimum: 10
          maximum: 95
        memory_threshold:
          type: integer
          minimum: 10
          maximum: 95
          
    UpdateRegistrationRequest:
      type: object
      properties:
        allow_register:
          type: boolean

    CreateUserRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [admin, user]

    ProvisionDeviceRequest:
      type: object
      required: [name]
      properties:
        device_id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [temperature, humidity, weather, actuator, sensor]
          
    LogEntry:
      type: object
      properties:
        raw:
          type: string
          description: Raw log line content
        timestamp:
          type: string
          format: date-time
        level:
          type: string
        message:
          type: string

    CheckUIDResponse:
      type: object
      properties:
        registered:
          type: boolean
        device_id:
          type: string
        has_pending:
          type: boolean
        request_id:
          type: string

    Rule:
      type: object
      properties:
        id:
          type: string
          description: Unique rule identifier
        name:
          type: string
          description: Human-readable rule name
        description:
          type: string
        device_id:
          type: string
          description: Target device (empty for all devices)
        conditions:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              operator:
                type: string
                enum: [gt, gte, lt, lte, eq, neq, contains]
              value: {}
        actions:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [webhook, log, mqtt]
              config:
                type: object
        enabled:
          type: boolean
        fire_count:
          type: integer
      required:
        - name
        - conditions
        - actions

paths:
  /:
    get:
      summary: API Info
      tags: [System]
      responses:
        '200':
          description: API information

  /sys/time:
    get:
      summary: Get system time
      description: Returns current server time in Unix and ISO8601 formats. Useful for Christian's Algorithm time sync.
      tags: [System]
      responses:
        '200':
          description: Current time
          content:
            application/json:
              schema:
                type: object
                properties:
                  unix:
                    type: integer
                    format: int64
                    description: Unix timestamp in seconds
                  unix_ms:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds
                  timestamp:
                    type: integer
                    format: int64
                    description: Unix timestamp in nanoseconds
                  iso8601:
                    type: string
                    format: date-time


  /sys/ip:
    get:
      summary: Get system IP
      description: Returns the public IP address of the client as seen by the server.
      tags: [System]
      responses:
        '200':
          description: Client IP address
          content:
            text/plain:
              schema:
                type: string
                example: "127.0.0.1"


  /sys/status:
    get:
      summary: Get system status
      tags: [System]
      responses:
        '200':
          description: System status
          content:
            application/json:
              schema:
                type: object
                properties:
                  initialized:
                    type: boolean

  /sys/setup:
    post:
      summary: Initialize system
      tags: [System]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupRequest'
      responses:
        '201':
          description: System initialized
        '409':
          description: Already initialized

  /healthz:
    get:
      summary: Health check (alias)
      tags: [System]
      responses:
        '200':
          description: Healthy

  /auth/refresh:
    post:
      summary: Rotate refresh token
      description: Exchange a valid refresh token for a new access + refresh token pair. The old refresh token is invalidated (rotation). Reuse of a revoked token triggers revocation of all sessions for security.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid or expired refresh token

  /auth/logout:
    post:
      summary: Logout current session
      description: Revokes the current session identified by the Bearer token. Other sessions (other devices) remain active.
      tags: [Authentication]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Session revoked

  /auth/sessions:
    get:
      summary: List active sessions
      description: Returns all active login sessions for the authenticated user.
      tags: [Authentication]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Active sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Session'

  /auth/me:
    get:
      summary: Get profile
      description: Returns the authenticated user's profile including ntfy topic for push notifications.
      tags: [Authentication]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
    put:
      summary: Update profile
      description: Update display name for the authenticated user.
      tags: [Authentication]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'

  /auth/push-token:
    post:
      summary: Register push token
      description: Register a device push token (FCM, APNs, ntfy, or web push) for the authenticated user. Duplicate tokens are silently replaced.
      tags: [Authentication]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platform, token]
              properties:
                platform:
                  type: string
                  enum: [ios, android, web, ntfy]
                token:
                  type: string
      responses:
        '200':
          description: Token registered

  /auth/push-token/{id}:
    delete:
      summary: Unregister push token
      tags: [Authentication]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token removed

  /auth/oauth/{provider}:
    get:
      summary: Initiate OAuth login
      description: |
        Redirects to the OAuth provider (google or github) for authentication.

        **Web flow**: Simply redirect the browser here. After auth the callback returns JSON.

        **Mobile/PKCE flow**: Pass `code_challenge` (SHA-256 of your random verifier, base64url-encoded) and `redirect_uri` (your app's deep-link URI). After auth the callback redirects to your app with `access_token` and `refresh_token` as query parameters.
      tags: [Authentication]
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, github]
        - name: redirect_uri
          in: query
          description: Mobile app deep-link URI (PKCE flow only)
          schema:
            type: string
        - name: code_challenge
          in: query
          description: PKCE code challenge — SHA-256(code_verifier), base64url-encoded (mobile flow only)
          schema:
            type: string
      responses:
        '302':
          description: Redirect to OAuth provider

  /auth/oauth/{provider}/callback:
    get:
      summary: OAuth callback
      description: Handles the provider's redirect. Web clients receive a JSON AuthResponse. Mobile clients are redirected to their `redirect_uri` with tokens as query parameters.
      tags: [Authentication]
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, github]
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Authentication successful (web flow)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '302':
          description: Redirect with tokens (mobile/PKCE flow)

  /auth/register:
    post:
      summary: Register new user
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: User already exists

  /auth/login:
    post:
      summary: Login user
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  /auth/keys:
    post:
      summary: Create User API Key
      tags: [Authentication]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKeyRequest'
      responses:
        '201':
          description: Key created (Save the key!)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyResponse'
    get:
      summary: List User API Keys
      tags: [Authentication]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/KeyResponse'

  /auth/keys/{id}:
    delete:
      summary: Revoke User API Key
      tags: [Authentication]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Key deleted

  /auth/forgot-password:
    post:
      summary: Request password reset email
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Email sent (if user exists)

  /auth/reset-password:
    post:
      summary: Complete password reset
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password updated

  /auth/password:
    put:
      summary: Change password
      tags: [Authentication]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed

  /auth/user:
    delete:
      summary: Delete account
      description: Permanently delete the authenticated user and all their devices/data.
      tags: [Authentication]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account deleted

  /dev/fw/{filename}:
    get:
      summary: Download Firmware (Secured)
      tags: [Devices]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Device API key
      responses:
        '200':
          description: Firmware binary
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary


  /dev:
    post:
      summary: Create device
      tags: [Devices]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCreateRequest'
      responses:
        '201':
          description: Device created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
    get:
      summary: List devices
      tags: [Devices]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of devices

  /dev/register:
    post:
      summary: Register device (Mobile App)
      tags: [Provisioning]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceRequest'
      responses:
        '201':
          description: Device registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterDeviceResponse'

  /dev/check-uid/{uid}:
    get:
      summary: Check if device UID is registered
      tags: [Provisioning]
      security:
        - BearerAuth: []
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckUIDResponse'

  /dev/prov:
    get:
      summary: List user provisioning requests
      tags: [Provisioning]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of requests

  /dev/prov/{request_id}:
    get:
      summary: Get provisioning request status
      tags: [Provisioning]
      security:
        - BearerAuth: []
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Request status
    delete:
      summary: Cancel provisioning request
      tags: [Provisioning]
      security:
        - BearerAuth: []
      parameters:
        - name: request_id
