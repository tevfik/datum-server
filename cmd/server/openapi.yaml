          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Rule' }
      responses:
        '200':
          description: Rule updated
    delete:
      summary: Delete rule
      tags: [Rules]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Rule deleted

  /rules/{rule_id}/enable:
    put:
      summary: Enable rule
      tags: [Rules]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Rule enabled

  /rules/{rule_id}/disable:
    put:
      summary: Disable rule
      tags: [Rules]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Rule disabled

  /rules/{rule_id}/trigger:
    post:
      summary: Manually trigger a rule
      tags: [Rules]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Trigger result
          content:
            application/json:
              schema:
                type: object
                properties:
                  triggered: { type: boolean }
                  fired: { type: boolean }

  /admin/rules:
    get:
      summary: List all rules (Admin)
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of all rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items: { $ref: '#/components/schemas/Rule' }

  # --- Knowledge Packs (gateway to gleann) ---
  /packs:
    get:
      summary: List knowledge packs
      description: |
        Returns all packs available in the connected gleann instance.
        Use `?app=ekiyo` to retrieve only packs relevant to a specific app.
        Responses are cached on the server for 5 minutes; use `If-None-Match`
        with the returned `ETag` to avoid unnecessary data transfer.
      tags: [Packs]
      security:
        - BearerAuth: []
      parameters:
        - name: app
          in: query
          required: false
          schema:
            type: string
          description: Filter packs by app hint (e.g. `ekiyo`)
      responses:
        '200':
          description: Pack list
          content:
            application/json:
              schema:
                type: object
                properties:
                  packs:
                    type: array
                    items:
                      $ref: '#/components/schemas/PackManifest'
                  count:
                    type: integer
        '401':
          description: Unauthorized
        '502':
          description: Upstream gleann unreachable

  /packs/{id}:
    get:
      summary: Get pack manifest
      tags: [Packs]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Pack identifier (e.g. `crops-tr`)
      responses:
        '200':
          description: Pack manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackManifest'
        '304':
          description: Not modified (ETag matched)
        '401':
          description: Unauthorized
        '404':
          description: Pack not found
        '502':
          description: Upstream gleann unreachable

  /packs/{id}/data:
    get:
      summary: Get full pack contents
      description: |
        Returns the manifest and the full items array.
        Supports conditional requests via `If-None-Match` / `ETag` so
        offline-first clients only re-download when the pack has changed.
      tags: [Packs]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Pack identifier
      responses:
        '200':
          description: Manifest + items
          content:
            application/json:
              schema:
                type: object
                properties:
                  manifest:
                    $ref: '#/components/schemas/PackManifest'
                  items:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '304':
          description: Not modified (ETag matched)
        '401':
          description: Unauthorized
        '404':
          description: Pack not found
        '502':
          description: Upstream gleann unreachable

  /packs/{id}/items/{slug}:
    get:
      summary: Get a single item by slug
      tags: [Packs]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Pack identifier
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Item slug (e.g. `pepper_capia`)
      responses:
        '200':
          description: Item object
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '304':
          description: Not modified (ETag matched)
        '401':
          description: Unauthorized
        '404':
          description: Pack or item not found
        '502':
          description: Upstream gleann unreachable

  /packs/{id}/search:
    get:
      summary: Search pack items
      description: Case-insensitive substring search across `search.fields` declared in `pack.yaml`.
      tags: [Packs]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Pack identifier
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: n
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Maximum number of results
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  count:
                    type: integer
                  query:
                    type: string
        '401':
          description: Unauthorized
        '404':
          description: Pack not found
        '502':
          description: Upstream gleann unreachable

  # --- Metrics (Prometheus) ---
  /sys/metrics:
    get:
      summary: Get application metrics
      description: |
        Returns metrics in JSON or Prometheus text format.
        Use `?format=prometheus` for Prometheus scraping.
      tags: [System]
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [json, prometheus]
      responses:
        '200':
          description: Metrics response
