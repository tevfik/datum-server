        - ApiKeyAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: command
                data: {"id":"cmd123","action":"reboot","params":{}}
                
                event: ping
                data: {"time":"2024-01-01T12:00:00Z"}


