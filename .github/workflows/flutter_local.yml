name: Flutter App (Container)

on:
  push:
    paths:
      - 'examples/datum_camera_app/**'
      - '.github/workflows/flutter_local.yml'
  pull_request:
    paths:
      - 'examples/datum_camera_app/**'
      - '.github/workflows/flutter_local.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build and Test in Container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app/examples/datum_camera_app \
            -e GITHUB_WORKSPACE=/app \
            datum-flutter-builder:latest \
            /bin/bash -c "
              echo '📂 Debugging Container Paths:'
              pwd
              ls -la /app
              ls -la /app/examples || echo 'e: examples not found'
              ls -la /app/examples/datum_camera_app || echo 'e: datum_camera_app not found'
              
              git config --global --add safe.directory '*' && \
              flutter pub get && \
              flutter pub run build_runner build --delete-conflicting-outputs && \
              flutter analyze && \
              flutter test && \
              flutter build apk --release
            "
        
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: datum-app-release-apk
          path: examples/datum_camera_app/build/app/outputs/flutter-apk/app-release.apk
