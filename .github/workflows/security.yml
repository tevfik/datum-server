name: Security

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/security.yml'
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 02:00
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Generate go.sum
        run: go mod tidy && go mod verify

      - name: Run Gosec Security Scanner
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt=json -out=gosec-report.json ./... || true

      - name: Upload security report
        uses: actions/upload-artifact@v3
        with:
          name: security-report
          path: gosec-report.json

      - name: Check for vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true
        continue-on-error: true  # Don't fail on vulnerabilities for now

      - name: Display Gosec findings
        if: always()
        run: |
          if [ -f gosec-report.json ]; then
            echo "🔒 Security scan completed. Check gosec-report.json artifact for details."
          fi
