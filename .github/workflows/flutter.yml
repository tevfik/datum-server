name: Flutter App

on:
  push:
    paths:
      - 'examples/flutter_app/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    paths:
      - 'examples/flutter_app/**'
      - '.github/workflows/flutter.yml'

jobs:
  test-flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./examples/flutter_app

    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Mocks
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-android:
    needs: test-flutter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./examples/flutter_app
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: android-actions/setup-android@v2
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
      - run: flutter pub get
      
      - name: Debug & Config Android SDK
        run: |
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo "ANDROID_HOME: $ANDROID_HOME"
          flutter config --android-sdk $ANDROID_SDK_ROOT
          yes | flutter doctor --android-licenses || true
          flutter doctor -v

      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: datum-app-release-apk
          path: examples/flutter_app/build/app/outputs/flutter-apk/app-release.apk

