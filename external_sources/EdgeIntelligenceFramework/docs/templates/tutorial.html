{% extends "base.html" %}

{% block title %}{{ title }} - EIF Documentation{% endblock %}
{% block header_title %}{{ title }}{% endblock %}

{% block content %}
<div class="tutorial-meta" style="margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px;">
    {% if json_support %}
    <span class="badge-json">JSON Supported</span>
    {% endif %}
    <span class="tag">{{ category }}</span>
    <span class="tag" style="background:#f0f0f0;">{{ path }}</span>
</div>

<div class="markdown-body">
    {{ content | safe }}
</div>
{% endblock %}
