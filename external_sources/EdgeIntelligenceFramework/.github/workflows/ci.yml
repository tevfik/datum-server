name: EIF CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Release

jobs:
  # ==========================================================================
  # 🐧 Build and Test on Linux (Host Runner)
  # ==========================================================================
  linux-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make build-essential git

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}} -j$(nproc)

      - name: Run Tests
        run: |
          cd build
          if ls test_* 1> /dev/null 2>&1; then
             ctest --output-on-failure
             echo "✅ All tests passed!"
          else
             echo "⚠️ No tests found or built via ctest."
          fi

      - name: Run Benchmarks
        run: |
          if [ -f ./build/bin/benchmark_suite ]; then
            ./build/bin/benchmark_suite --batch
          else
            echo "Benchmark suite not found, skipping..."
          fi

  # ==========================================================================
  # 🤖 Arduino Library Verification
  # ==========================================================================
  arduino-verify:
    runs-on: ubuntu-latest
    needs: linux-build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          export PATH=$PATH:./bin
          mv bin/arduino-cli /usr/local/bin/ || echo "Moving failed, using local bin"

      - name: Install Cores
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Copy Library
        run: |
          mkdir -p /root/Arduino/libraries
          if [ -d "arduino/EIF" ]; then
            cp -r arduino/EIF /root/Arduino/libraries/
          else
            echo "⚠️ arduino/EIF directory not found! Check repo structure."
          fi

      - name: Compile for AVR (Uno)
        run: |
          if [ -d "arduino/EIF/examples/SensorSmoothing" ]; then
            arduino-cli compile --fqbn arduino:avr:uno arduino/EIF/examples/SensorSmoothing
          else
            echo "Example not found, skipping..."
          fi

  # ==========================================================================
  # 🦾 ARM Cross-Compile Check
  # ==========================================================================
  arm-check:
    runs-on: ubuntu-latest
    needs: linux-build
      # ========================================================================== 
      # 🔍 Static Analysis (cppcheck + flawfinder)
      # ========================================================================== 
      static-analysis:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4

          - name: Install tools
            run: |
              sudo apt-get update
              sudo apt-get install -y cppcheck flawfinder

          - name: Run cppcheck
            run: |
              cppcheck --enable=warning,performance,portability,unusedFunction \
                       --error-exitcode=1 \
                       --inline-suppr \
                       --suppress=missingIncludeSystem \
                       -I core/include -I dsp/include -I da/include -I dl/include -I cv/include -I bf/include -I ml/include -I hal/include -I nlp/include \
                       core dsp da dl cv bf ml hal nlp

          - name: Run flawfinder
            run: |
              flawfinder --quiet --minlevel=3 --columns . || true

      # ========================================================================== 
      # 🧪 ASan/UBSan Build
      # ========================================================================== 
      asan-ubsan:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4

          - name: Install Build Tools
            run: |
              sudo apt-get update
              sudo apt-get install -y cmake make build-essential

          - name: Configure (ASan/UBSan)
            run: |
              cmake -B build-asan -DCMAKE_BUILD_TYPE=Debug \
                    -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
                    -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

          - name: Build (ASan/UBSan)
            run: cmake --build build-asan -j$(nproc)

          - name: Run Tests (ASan/UBSan)
            run: |
              cd build-asan && ctest --output-on-failure

      # ========================================================================== 
      # 📈 Coverage (gcov/lcov)
      # ========================================================================== 
      coverage:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4

          - name: Install Coverage Tools
            run: |
              sudo apt-get update
              sudo apt-get install -y cmake make build-essential lcov

          - name: Configure (Coverage)
            run: |
              cmake -B build-cov -DCMAKE_BUILD_TYPE=Debug \
                    -DCMAKE_C_FLAGS="--coverage -O0" -DCMAKE_EXE_LINKER_FLAGS="--coverage"

          - name: Build (Coverage)
            run: cmake --build build-cov -j$(nproc)

          - name: Run Tests (Coverage)
            run: |
              cd build-cov && ctest --output-on-failure

          - name: Generate lcov report
            run: |
              lcov --directory build-cov --capture --output-file coverage.info
              lcov --remove coverage.info '*/tests/*' '/usr/*' --output-file coverage.info
              genhtml coverage.info --output-directory coverage_html

          - name: Upload Coverage Artifact
            uses: actions/upload-artifact@v4
            with:
              name: coverage-html
              path: coverage_html
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM Toolchain
        run: |
          apt-get update
          apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Check ARM Cortex-M Headers
        run: |
          echo "Checking ARM Cortex-M compatibility..."
          
          if [ ! -d "core/include" ]; then echo "core/include not found!"; exit 0; fi
          
          INCLUDES="-I core/include -I hal/include -I dsp/include -I ml/include -I dl/include -I cv/include -I da/include -I bf/include -I el/include -I nlp/include"
          
          shopt -s nullglob
          
          files=(core/include/*.h hal/include/*.h)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No header files found to check."
          else
            for f in "${files[@]}"; do
              echo "Checking $f"
              arm-none-eabi-gcc -fsyntax-only -mcpu=cortex-m4 -mthumb \
                $INCLUDES -x c "$f" || echo "⚠️ Warning: $f has issues"
            done
          fi
          echo "✅ Header syntax check complete"

  # ==========================================================================
  # 📊 Memory Usage Analysis
  # ==========================================================================
  memory-analysis:
    runs-on: ubuntu-latest
    needs: linux-build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y cmake make build-essential

      - name: Build with Size Optimization
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=MinSizeRel
          cmake --build build -j$(nproc)

      - name: Analyze Binary Sizes
        run: |
          echo "=== Binary Sizes ===" 
          echo "| Demo | Size |"
          echo "|------|------|"
          
          shopt -s nullglob
          for f in build/bin/*; do
            if [ -f "$f" ]; then
              filesize=$(du -h "$f" | cut -f1)
              name=$(basename "$f")
              echo "| $name | $filesize |"
            fi
          done